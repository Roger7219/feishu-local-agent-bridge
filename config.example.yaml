feishu:
  # Run `lark-cli event list` and keep this default for receiving bot messages.
  event_key: im.message.receive_v1
  event_as: bot
  # Prefer bot replies. The bridge can fall back to user if bot sending is not ready.
  send_as: bot
  bot_name: YourBotName

security:
  trigger: mention_or_dm
  allowed_chat_ids: []
  blocked_open_ids: []
  max_reply_chars: 3000
  command_timeout_seconds: 120
  rate_limit_per_user_per_minute: 5
  rate_limit_per_user_per_hour: 50
  rate_limit_per_chat_per_minute: 20
  # Optional guardrail. Set true if the bridge should reject write-like chat requests before calling the local agent.
  block_write_intents: false

agent:
  enabled: true
  # Replace this with your local agent command. The incoming chat text is injected into `{query}`.
  # Keep it as a YAML list; the bridge never invokes a shell.
  command:
    - python3
    - /absolute/path/to/your_agent.py
    - --query
    - "{query}"
  cwd: .
  env: {}

output:
  dir: ./outputs

logging:
  dir: ./logs
